<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TrelloMini - Projects</title>
    <script>
    (function () {
        var t = localStorage.getItem('tm_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        try {
            var s = JSON.parse(localStorage.getItem('tm_settings') || '{}');
            document.documentElement.lang = s.language || 'vi';
        } catch {
            document.documentElement.lang = 'vi';
        }
        window.addEventListener('storage', function (e) {
            if (e.key === 'tm_theme')
                document.documentElement.setAttribute('data-theme', e.newValue || 'dark');
        });
    })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/project.css">
    
</head>
<body>

    <div id="toast-container"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">TM</div>
            <span class="logo-text">TrelloMini</span>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Workspace</div>
            <a class="sidebar-item" href="/dashboard.html">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3h14v1.5H1V3zm0 4h14v1.5H1V7zm0 4h8v1.5H1V11z" /></svg>
                Board
            </a>
            <a class="sidebar-item active" href="/projects.html">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm0 7h5v5H2V9zm7-7h5v5H9V2zm0 7h5v5H9V9z" /></svg>
                Projects
            </a>
        </div>

        <div class="sidebar-footer">
            <a class="sidebar-item active" href="/settings.html">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 100 6.492 3.246 3.246 0 000-6.492zM5.754 8a2.246 2.246 0 114.492 0 2.246 2.246 0 01-4.492 0z" /><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 01-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 01-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 01.52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 011.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 011.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 01.52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 01-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 01-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 002.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 001.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 00-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 00-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 00-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 003.06 9.377l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 004.175 5.02l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 002.692-1.115l.094-.319z" /></svg>
                Setting
            </a>
            <div class="user-chip">
                <div class="avatar" id="sidebar-avatar">U</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sidebar-name">User</div>
                    <div style="font-size:11px;color:var(--text-muted);">Member</div>
                </div>
                <button class="btn btn-ghost" onclick="logout()" style="padding:4px 8px;font-size:12px;">Logout</button>
            </div>
        </div>
        
    </aside>

    <!-- MAIN -->
    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <span>TrelloMini</span>
                <span class="breadcrumb-sep">›</span>
                <span class="topbar-title">Projects</span>
            </div>
        </header>

        <div class="content">

            <!-- CREATE PROJECT -->
            <div class="section-header">
                <div class="section-title">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--accent-blue)"><path d="M8 2a.5.5 0 01.5.5v5h5a.5.5 0 010 1h-5v5a.5.5 0 01-1 0v-5h-5a.5.5 0 010-1h5v-5A.5.5 0 018 2z" /></svg>
                    Tạo Project Mới
                </div>
            </div>

            <div class="create-panel">
                <div class="create-grid">
                    <div class="field-group">
                        <label>Tên project</label>
                        <input id="proj-name" placeholder="Ví dụ: Sprint Q1 2025" />
                    </div>
                    <div class="field-group">
                        <label>Project Key <span style="color:var(--text-muted);font-weight:400;">(tùy chọn)</span></label>
                        <input id="proj-key" placeholder="VD: SP, PRJ..." />
                    </div>
                </div>
                <div class="field-group" style="margin-bottom:14px;">
                    <label>Mô tả</label>
                    <textarea id="proj-desc" placeholder="Mô tả ngắn về project..."></textarea>
                </div>
                <div class="create-footer">
                    <button class="btn btn-primary" id="btn-create-proj">
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="white"><path d="M8 2a.5.5 0 01.5.5v5h5a.5.5 0 010 1h-5v5a.5.5 0 01-1 0v-5h-5a.5.5 0 010-1h5v-5A.5.5 0 018 2z" /></svg>
                        Tạo Project
                    </button>
                </div>
            </div>

            <!-- PROJECTS LIST -->
            <div class="section-header">
                <div class="section-title">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--text-secondary)"><path d="M2 2h5v5H2V2zm0 7h5v5H2V9zm7-7h5v5H9V2zm0 7h5v5H9V9z" /></svg>
                    Danh Sách Projects
                </div>
            </div>

            <div id="projects" class="projects-grid">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>

            <!-- PROJECT DETAILS -->
            <div id="project-details-area"></div>

        </div>
    </div>

    <script>
        let csrfToken = null;
        let currentUser = null;
        let currentProjectId = null;
        const SETTINGS_KEY = 'tm_settings';

        const I18N = {
            vi: {
                board: 'Board',
                projects: 'Projects',
                settings: 'Setting',
                logout: 'Logout',
                createSection: 'Tạo Project Mới',
                projectName: 'Tên project',
                optional: '(tùy chọn)',
                projectNamePlaceholder: 'Ví dụ: Sprint Q1 2025',
                projectKeyPlaceholder: 'VD: SP, PRJ...',
                description: 'Mô tả',
                descriptionPlaceholder: 'Mô tả ngắn về project...',
                createProject: 'Tạo Project',
                listSection: 'Danh Sách Projects',
                noProjects: 'Chưa có project nào',
                noProjectsSub: 'Tạo project đầu tiên của bạn ở trên',
                noDescription: 'Không có mô tả',
                members: 'thành viên',
                open: 'Mở →',
                loadProjectsError: 'Lỗi tải projects',
                enterProjectName: 'Vui lòng nhập tên project',
                creating: 'Đang tạo...',
                createSuccess: 'Đã tạo project thành công',
                createFailed: 'Tạo project thất bại: ',
                createError: 'Lỗi tạo project',
                loadProjectError: 'Lỗi tải project',
                close: '✕ Đóng',
                membersTitle: 'Thành viên',
                addEmailPlaceholder: 'Email người dùng cần thêm...',
                add: 'Thêm',
                noMembers: 'Chưa có thành viên nào',
                owner: '👑 Owner',
                member: 'Member',
                remove: 'Xóa',
                enterEmail: 'Vui lòng nhập email',
                addMemberSuccess: 'Đã thêm thành viên',
                addMemberFailed: 'Thêm thành viên thất bại: ',
                addMemberError: 'Lỗi thêm thành viên',
                removeConfirm: 'Xóa thành viên này khỏi project?',
                removeSuccess: 'Đã xóa thành viên',
                removeFailed: 'Xóa thất bại: ',
                removeError: 'Lỗi xóa thành viên',
            },
            en: {
                board: 'Board',
                projects: 'Projects',
                settings: 'Settings',
                logout: 'Logout',
                createSection: 'Create New Project',
                projectName: 'Project name',
                optional: '(optional)',
                projectNamePlaceholder: 'Example: Sprint Q1 2025',
                projectKeyPlaceholder: 'Ex: SP, PRJ...',
                description: 'Description',
                descriptionPlaceholder: 'Short project description...',
                createProject: 'Create Project',
                listSection: 'Projects List',
                noProjects: 'No projects yet',
                noProjectsSub: 'Create your first project above',
                noDescription: 'No description',
                members: 'members',
                open: 'Open →',
                loadProjectsError: 'Failed to load projects',
                enterProjectName: 'Please enter a project name',
                creating: 'Creating...',
                createSuccess: 'Project created successfully',
                createFailed: 'Create project failed: ',
                createError: 'Create project error',
                loadProjectError: 'Failed to load project',
                close: '✕ Close',
                membersTitle: 'Members',
                addEmailPlaceholder: 'User email to add...',
                add: 'Add',
                noMembers: 'No members yet',
                owner: '👑 Owner',
                member: 'Member',
                remove: 'Remove',
                enterEmail: 'Please enter an email',
                addMemberSuccess: 'Member added',
                addMemberFailed: 'Add member failed: ',
                addMemberError: 'Add member error',
                removeConfirm: 'Remove this member from the project?',
                removeSuccess: 'Member removed',
                removeFailed: 'Remove failed: ',
                removeError: 'Remove member error',
            }
        };

        function getLanguage() {
            try {
                return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}').language || 'vi';
            } catch {
                return 'vi';
            }
        }

        function tr(key) {
            const lang = getLanguage();
            return (I18N[lang] || I18N.vi)[key] || I18N.vi[key] || key;
        }

        function createProjectButtonHtml() {
            return `<svg width="12" height="12" viewBox="0 0 16 16" fill="white"><path d="M8 2a.5.5 0 01.5.5v5h5a.5.5 0 010 1h-5v5a.5.5 0 01-1 0v-5h-5a.5.5 0 010-1h5v-5A.5.5 0 018 2z"/></svg> ${tr('createProject')}`;
        }

        function applyLanguage() {
            const lang = getLanguage();
            document.documentElement.lang = lang;
            document.title = `TrelloMini - ${tr('projects')}`;

            const sidebarItems = document.querySelectorAll('.sidebar-item');
            if (sidebarItems[0]) sidebarItems[0].lastChild.textContent = tr('board');
            if (sidebarItems[1]) sidebarItems[1].lastChild.textContent = tr('projects');
            if (sidebarItems[2]) sidebarItems[2].lastChild.textContent = tr('settings');
            document.querySelector('.topbar-title').textContent = tr('projects');
            document.querySelector('.user-chip button').textContent = tr('logout');

            const titles = document.querySelectorAll('.section-title');
            if (titles[0]) titles[0].lastChild.textContent = tr('createSection');
            if (titles[1]) titles[1].lastChild.textContent = tr('listSection');

            const labels = document.querySelectorAll('.create-panel label');
            if (labels[0]) labels[0].textContent = tr('projectName');
            if (labels[1]) labels[1].innerHTML = `Project Key <span style="color:var(--text-muted);font-weight:400;">${tr('optional')}</span>`;
            if (labels[2]) labels[2].textContent = tr('description');
            document.getElementById('proj-name').placeholder = tr('projectNamePlaceholder');
            document.getElementById('proj-key').placeholder = tr('projectKeyPlaceholder');
            document.getElementById('proj-desc').placeholder = tr('descriptionPlaceholder');
            document.getElementById('btn-create-proj').innerHTML = createProjectButtonHtml();
        }

        // ===== TOAST =====
        function showToast(msg, type = 'info', duration = 3000) {
            const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<span class="toast-icon">${icons[type]}</span><span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
            c.appendChild(t);
            setTimeout(() => { t.style.animation = 'toastOut .25s ease forwards'; setTimeout(() => t.remove(), 250); }, duration);
        }

        // ===== UTILS =====
        function getInitials(name) {
            if (!name) return '?';
            return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // ===== AUTH =====
        async function fetchCsrfToken() {
            try {
                const res = await fetch('/api/antiforgery/token', { credentials: 'include' });
                if (res.ok) { const j = await res.json(); csrfToken = j.token; }
            } catch (e) { console.error(e); }
        }

        async function loadCurrentUser() {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (res.ok) {
                    currentUser = await res.json();
                    const name = currentUser.username || currentUser.email || 'User';
                    document.getElementById('sidebar-avatar').textContent = getInitials(name);
                    document.getElementById('sidebar-name').textContent = name;
                }
            } catch (e) { console.error(e); }
        }

        // ===== PROJECTS =====
        async function loadProjects() {
            const container = document.getElementById('projects');
            try {
                const res = await fetch('/api/projects', { credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                container.innerHTML = '';

                if (!data.length) {
                    container.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="empty-icon">📂</div>
              <div class="empty-title">${tr('noProjects')}</div>
              <div class="empty-sub">${tr('noProjectsSub')}</div>
            </div>`;
                    return;
                }

                data.forEach(p => {
                    const el = document.createElement('div');
                    el.className = 'project-card';
                    el.dataset.id = p.id;
                    const initial = (p.name || 'P')[0].toUpperCase();
                    // memberCount từ API (sau khi fix backend)
                    const memberCount = p.memberCount ?? 0;

                    el.innerHTML = `
            <div class="proj-header">
              <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
                <div class="proj-icon">${initial}</div>
                <div class="proj-name" style="min-width:0;">${escapeHtml(p.name)}</div>
              </div>
              ${p.projectKey ? `<span class="proj-key">${escapeHtml(p.projectKey)}</span>` : ''}
            </div>
            <div class="proj-desc">${escapeHtml(p.description || tr('noDescription'))}</div>
            <div class="proj-footer">
              <div class="member-pill">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 100-6 3 3 0 000 6z"/></svg>
                ${memberCount} ${tr('members')}
              </div>
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();viewProject('${p.id}')">${tr('open')}</button>
            </div>`;
                    el.addEventListener('click', () => viewProject(p.id));
                    container.appendChild(el);
                });
            } catch (e) { console.error(e); showToast(tr('loadProjectsError'), 'error'); }
        }

        async function createProject() {
            const name = document.getElementById('proj-name').value.trim();
            const key = document.getElementById('proj-key').value.trim();
            const desc = document.getElementById('proj-desc').value.trim();
            if (!name) { showToast(tr('enterProjectName'), 'warning'); return; }

            const btn = document.getElementById('btn-create-proj');
            btn.disabled = true; btn.textContent = tr('creating');
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (csrfToken) headers['X-XSRF-TOKEN'] = csrfToken;
                const res = await fetch('/api/projects', {
                    method: 'POST', credentials: 'include', headers,
                    body: JSON.stringify({ name, projectKey: key, description: desc })
                });
                if (res.ok) {
                    document.getElementById('proj-name').value = '';
                    document.getElementById('proj-key').value = '';
                    document.getElementById('proj-desc').value = '';
                    showToast(tr('createSuccess'), 'success');
                    loadProjects();
                } else {
                    showToast(tr('createFailed') + await res.text(), 'error');
                }
            } catch (e) { console.error(e); showToast(tr('createError'), 'error'); }
            btn.disabled = false;
            btn.innerHTML = createProjectButtonHtml();
        }

        async function viewProject(id) {
            currentProjectId = id;
            document.querySelectorAll('.project-card').forEach(c => c.classList.remove('selected'));
            const selectedCard = document.querySelector(`.project-card[data-id='${id}']`);
            if (selectedCard) selectedCard.classList.add('selected');

            const area = document.getElementById('project-details-area');
            area.innerHTML = '';

            try {
                const res = await fetch('/api/projects/' + id, { credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                if (!res.ok) { showToast(tr('loadProjectError'), 'error'); return; }
                const p = await res.json();

                const panel = document.createElement('div');
                panel.className = 'detail-panel';
                panel.innerHTML = `
          <div class="detail-header">
            <div class="detail-title">
              <div class="proj-icon" style="width:28px;height:28px;font-size:12px;">${(p.name || 'P')[0].toUpperCase()}</div>
              ${escapeHtml(p.name)}
              ${p.projectKey ? `<span class="proj-key">${escapeHtml(p.projectKey)}</span>` : ''}
            </div>
            <button class="btn btn-ghost btn-sm" onclick="closeDetail()">${tr('close')}</button>
          </div>
          <div class="detail-body">
            ${p.description ? `<div style="font-size:13.5px;color:var(--text-secondary);margin-bottom:20px;padding:10px 12px;background:var(--bg-hover);border-radius:var(--radius-md);">${escapeHtml(p.description)}</div>` : ''}
            <div class="members-label">
              ${tr('membersTitle')}
              <span class="member-count-badge">${p.members?.length ?? 0}</span>
            </div>
            <div class="member-list" id="members-${p.id}"></div>
            <div class="add-member-row">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--text-muted)" style="flex-shrink:0;"><path d="M6 8a3 3 0 100-6 3 3 0 000 6zm2-3a2 2 0 11-4 0 2 2 0 014 0zm4 8c0 1-1 1-1 1H1s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C9.516 10.68 8.289 10 6 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10zM13.5 5a.5.5 0 01.5.5V7h1.5a.5.5 0 010 1H14v1.5a.5.5 0 01-1 0V8h-1.5a.5.5 0 010-1H13V5.5a.5.5 0 01.5-.5z"/></svg>
              <input id="add-email-${p.id}" placeholder="${tr('addEmailPlaceholder')}" type="email" onkeydown="if(event.key==='Enter')addMember('${p.id}')" />
              <button class="btn btn-primary btn-sm" onclick="addMember('${p.id}')">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="white"><path d="M8 2a.5.5 0 01.5.5v5h5a.5.5 0 010 1h-5v5a.5.5 0 01-1 0v-5h-5a.5.5 0 010-1h5v-5A.5.5 0 018 2z"/></svg>
                ${tr('add')}
              </button>
            </div>
          </div>`;
                area.appendChild(panel);

                // render members — sử dụng p.members từ API /projects/{id} (đã có đầy đủ)
                renderMembers(p.id, p.members || []);

                panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (e) { console.error(e); showToast(tr('loadProjectError'), 'error'); }
        }

        function renderMembers(projectId, members) {
            const membersDiv = document.getElementById('members-' + projectId);
            if (!membersDiv) return;

            if (!members.length) {
                membersDiv.innerHTML = `<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">${tr('noMembers')}</div>`;
                return;
            }

            membersDiv.innerHTML = '';
            members.forEach(m => {
                const mi = document.createElement('div');
                mi.className = 'member-item';
                const isOwner = m.roleId === 1;
                mi.innerHTML = `
          <div class="member-info">
            <div class="member-avatar">${getInitials(m.username || m.email)}</div>
            <div>
              <div class="member-name">${escapeHtml(m.username || '—')}</div>
              <div class="member-email">${escapeHtml(m.email)}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="role-badge ${isOwner ? 'role-owner' : 'role-member'}">${isOwner ? tr('owner') : tr('member')}</span>
            ${!isOwner ? `<button class="btn btn-danger" onclick="removeMember('${projectId}','${m.userId}')">${tr('remove')}</button>` : ''}
          </div>`;
                membersDiv.appendChild(mi);
            });
        }

        async function addMember(projectId) {
            const input = document.getElementById('add-email-' + projectId);
            const email = input.value.trim();
            if (!email) { showToast(tr('enterEmail'), 'warning'); return; }
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (csrfToken) headers['X-XSRF-TOKEN'] = csrfToken;
                const res = await fetch(`/api/projects/${projectId}/members`, {
                    method: 'POST', credentials: 'include', headers,
                    body: JSON.stringify({ email })
                });
                if (res.ok) {
                    input.value = '';
                    showToast(tr('addMemberSuccess'), 'success');
                    viewProject(projectId);
                    loadProjects(); // cập nhật member count trên card
                } else {
                    const txt = await res.text();
                    showToast(tr('addMemberFailed') + txt, 'error');
                }
            } catch (e) { console.error(e); showToast(tr('addMemberError'), 'error'); }
        }

        async function removeMember(projectId, userId) {
            if (!confirm(tr('removeConfirm'))) return;
            try {
                const headers = {};
                if (csrfToken) headers['X-XSRF-TOKEN'] = csrfToken;
                const res = await fetch(`/api/projects/${projectId}/members/${userId}`, { method: 'DELETE', credentials: 'include', headers });
                if (res.ok) {
                    showToast(tr('removeSuccess'), 'info');
                    viewProject(projectId);
                    loadProjects();
                } else {
                    showToast(tr('removeFailed') + await res.text(), 'error');
                }
            } catch (e) { console.error(e); showToast(tr('removeError'), 'error'); }
        }

        function closeDetail() {
            document.getElementById('project-details-area').innerHTML = '';
            document.querySelectorAll('.project-card').forEach(c => c.classList.remove('selected'));
            currentProjectId = null;
        }

        function logout() { window.location.href = '/api/auth/signout-redirect?returnUrl=/login.html'; }

        document.getElementById('btn-create-proj').addEventListener('click', createProject);
        window.addEventListener('storage', e => {
            if (e.key !== SETTINGS_KEY) return;
            applyLanguage();
            loadProjects();
            if (currentProjectId) viewProject(currentProjectId);
        });

        (async function () {
            applyLanguage();
            await loadCurrentUser();
            await fetchCsrfToken();
            loadProjects();
        })();
    </script>
</body>
</html>
