<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <script>
        (function () {
            var t = localStorage.getItem('tm_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            window.addEventListener('storage', function (e) {
                if (e.key === 'tm_theme')
                    document.documentElement.setAttribute('data-theme', e.newValue || 'dark');
            });
        })();
    </script>
    <title>Trello - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-app: #0d1117;
            --bg-card: #1c2128;
            --bg-hover: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-blue: #388bfd;
            --font: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg-app);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: linear-gradient(rgba(56,139,253,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(56,139,253,0.03) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
            }

            body::after {
                content: '';
                position: fixed;
                top: -200px;
                left: 50%;
                transform: translateX(-50%);
                width: 600px;
                height: 600px;
                background: radial-gradient(circle, rgba(31,111,235,0.12) 0%, transparent 70%);
                pointer-events: none;
            }

        .login-wrap {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1f6feb 0%, #8957e5 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
            box-shadow: 0 0 40px rgba(31,111,235,0.35);
        }

        .logo-name {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            text-align: center;
        }

        .logo-tagline {
            font-size: 13.5px;
            color: var(--text-secondary);
            text-align: center;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 40px;
            width: 360px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(56,139,253,0.05);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            text-align: center;
        }

        .card-sub {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            text-align: center;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 11px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s;
        }

            .btn-google:hover {
                background: #2d333b;
                border-color: rgba(56,139,253,0.4);
                box-shadow: 0 0 0 3px rgba(56,139,253,0.1);
                transform: translateY(-1px);
            }

            .btn-google:active {
                transform: translateY(0);
                opacity: 0.85;
            }

        .google-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .info-box {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(56,139,253,0.06);
            border: 1px solid rgba(56,139,253,0.15);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .info-icon {
            color: var(--accent-blue);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .login-footer {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>

</head>
<body>

    <div class="login-wrap">

        <div class="logo-block">
            <div class="logo-icon">TL</div>
            <div>
                <div class="logo-name">Trello</div>
                <div class="logo-tagline">Quản lý công việc nhóm đơn giản &amp; hiệu quả</div>
            </div>
        </div>

        <div class="login-card">
            <div>
                <div class="card-title">Chào mừng trở lại 👋</div>
                <div class="card-sub">Đăng nhập để tiếp tục vào workspace của bạn</div>
            </div>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">Đăng nhập với</div>
                <div class="divider-line"></div>
            </div>

            <button class="btn-google" onclick="loginGoogle()">
                <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Tiếp tục với Google
            </button>

            <div class="info-box">
                <svg class="info-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0a8 8 0 100 16A8 8 0 008 0zm.75 11.5h-1.5v-5h1.5v5zm0-6.5h-1.5V3.5h1.5V5z" />
                </svg>
                <span>Chỉ tài khoản Google được chấp nhận. Không cần tạo tài khoản thêm.</span>
            </div>
        </div>

        <div class="login-footer">© 2025 Trello · Dự án học tập</div>

    </div>

    <script>
        function loginGoogle() {
            // if the page has a ?returnUrl=... query param use it, otherwise default to dashboard
            const params = new URLSearchParams(window.location.search);
            const returnUrl = params.get('returnUrl') || '/dashboard.html';
            window.location.href = '/api/Auth/google-login?returnUrl=' + encodeURIComponent(returnUrl);
        }
    </script>
</body>
</html>
